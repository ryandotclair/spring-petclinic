---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    role: frontend
    tier: web

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  labels:
    role: frontend
    tier: web
spec:
  replicas: 1
  selector:
    matchLabels:
      role: frontend
      tier: web
  template:
    metadata:
      labels:
        role: frontend
        tier: web
    spec:
      containers:
        - name: workload
          image: 10.38.48.51:5000/demo/petclinic:4.0.0-SNAPSHOT
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres

            # Credentials + JDBC URL come from the CloudNativePG-managed secret
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: jdbc-uri

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: username

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: password

            - name: SPRING_APPLICATION_JSON
              value: |
                {
                  "management.endpoint.health.probes.add-additional-paths": true
                }
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /livez
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
