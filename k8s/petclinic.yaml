---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    role: frontend
    tier: web

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  labels:
    role: frontend
    tier: web
spec:
  replicas: 1
  selector:
    matchLabels:
      role: frontend
      tier: web
  template:
    metadata:
      labels:
        role: frontend
        tier: web
    spec:
      containers:
        - name: workload
          image: 10.38.48.51:5000/demo/petclinic:4.0.0-SNAPSHOT
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: postgres

            # application-postgres.properties expects POSTGRES_URL / POSTGRES_USER / POSTGRES_PASS
            # Build URL from CNPG secret fields (do NOT use jdbc-uri — it embeds credentials)
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: port
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: dbname
            - name: POSTGRES_URL
              value: jdbc:postgresql://$(PGHOST):$(PGPORT)/$(PGDATABASE)
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: username
            - name: POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: demo-db-app
                  key: password

            - name: SPRING_APPLICATION_JSON
              value: |
                {
                  "management.endpoint.health.probes.add-additional-paths": true
                }
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /livez
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
