---
# Managed by CloudNativePG. The operator provisions:
#   - Service demo-db-rw (primary, read-write) — only this service is kept
#   - Secret  demo-db-app (username, password, dbname, host, port, uri, jdbc-uri)
#   - PVC(s) for each instance
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: demo-db
  labels:
    role: backend
    tier: database
    app: spring-cloud-petclinic-service
spec:
  instances: 1

  bootstrap:
    initdb:
      database: petclinic
      owner: petclinic

  storage:
    storageClass: nutanix-volume
    size: 10Gi

  # Drop unused services so only demo-db-rw is created
  managedServices:
    disabledDefaultServices:
      - ro
      - r
